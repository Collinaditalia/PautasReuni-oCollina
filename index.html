<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pautas de Reunião</title>

<!-- SDK Firebase compat v10.12.0 -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<!-- SDK EmailJS v3 -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root {
  --bg: #0f0f14;
  --surface: #1a1a24;
  --surface2: #22222f;
  --border: #2a2a3a;
  --text: #e1e1ec;
  --text2: #9898b0;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --green: #00d2a0;
  --red: #ff5e5e;
  --gold: #f0c040;
  --orange: #ff9f43;
  --radius: 14px;
  --radius-sm: 10px;
  --shadow: 0 8px 40px rgba(0,0,0,0.45);
  --font: 'Segoe UI', 'Inter', system-ui, sans-serif;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 30px 16px;
}
.app-container {
  width: 100%;
  max-width: 520px;
  transition: max-width 0.3s;
}
.app-container.wide { max-width: 900px; }
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.header-image {
  width: 100%;
  height: 160px;
  object-fit: cover;
  border-radius: var(--radius-sm);
  margin-bottom: 20px;
}
.card-header { text-align: center; margin-bottom: 24px; }
.logo-icon { font-size: 2.5rem; margin-bottom: 8px; }
.card-header h1 { font-size: 1.6rem; color: #fff; margin-bottom: 4px; }
.card-header p { color: var(--text2); font-size: 0.9rem; }
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  background: var(--surface2);
  padding: 4px;
  border-radius: var(--radius-sm);
}
.tab {
  flex: 1;
  padding: 10px;
  background: transparent;
  border: none;
  color: var(--text2);
  cursor: pointer;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 600;
  transition: all 0.2s;
}
.tab.active { background: var(--accent); color: #fff; }
.tab:hover:not(.active) { color: var(--text); }
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.form-group input, .form-group textarea, .form-group select {
  width: 100%;
  padding: 12px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 0.95rem;
  font-family: var(--font);
  transition: border-color 0.2s;
}
.form-group input:focus, .form-group textarea:focus {
  outline: none;
  border-color: var(--accent);
}
.form-group textarea { resize: vertical; min-height: 100px; }
.btn {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font);
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-outline {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
}
.btn-outline:hover { color: var(--text); border-color: var(--text2); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { opacity: 0.9; }
.btn-success { background: var(--green); color: #fff; }
.btn-success:hover { opacity: 0.9; }
.btn-warning { background: var(--orange); color: #fff; }
.btn-warning:hover { opacity: 0.9; }
.btn-sm { padding: 8px 14px; width: auto; font-size: 0.85rem; }
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.user-info { display: flex; align-items: center; gap: 12px; }
.avatar {
  width: 42px; height: 42px;
  background: var(--accent);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 1.1rem; color: #fff;
}
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 0.7rem;
  font-weight: 600;
}
.badge-admin { background: var(--gold); color: #000; }
.badge-user { background: var(--accent); color: #fff; }
.pauta-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 18px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.pauta-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.pauta-card h3 { font-size: 1.05rem; color: #fff; margin-bottom: 8px; }

/* Estilo para pauta expandida (aberta) */
.pauta-card-expanded {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 20px;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}
.pauta-card-expanded:hover { border-color: var(--accent); }
.pauta-card-expanded h3 { font-size: 1.1rem; color: #fff; margin-bottom: 6px; }
.pauta-content-display {
  background: var(--bg);
  border-radius: 8px;
  padding: 16px;
  margin: 12px 0;
  white-space: pre-wrap;
  line-height: 1.7;
  font-size: 0.93rem;
  color: var(--text);
  border: 1px solid var(--border);
}

.meta {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  font-size: 0.8rem;
  color: var(--text2);
}
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text2);
}
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  max-width: 560px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
}
.modal h2 { margin-bottom: 18px; color: #fff; font-size: 1.3rem; }
.close-btn {
  position: absolute;
  top: 14px; right: 14px;
  background: transparent;
  border: none;
  color: var(--text2);
  font-size: 1.3rem;
  cursor: pointer;
}
.close-btn:hover { color: var(--text); }
.checkbox-list {
  max-height: 200px;
  overflow-y: auto;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 10px;
}
.checkbox-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 6px;
  cursor: pointer;
  font-size: 0.9rem;
}
.checkbox-item:hover { background: var(--border); border-radius: 6px; }
.checkbox-item input[type="checkbox"] {
  width: 18px; height: 18px;
  accent-color: var(--accent);
  cursor: pointer;
}
.status-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.status-pending { background: var(--orange); color: #000; }
.status-active { background: var(--green); color: #fff; }
.toast-container {
  position: fixed;
  top: 20px; right: 20px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 0.9rem;
  font-weight: 500;
  animation: slideIn 0.3s ease;
  max-width: 320px;
}
.toast-success { background: var(--green); }
.toast-error { background: var(--red); }
.toast-info { background: var(--accent); }
@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
.loading-spinner { text-align: center; padding: 40px; }
.spinner {
  width: 40px; height: 40px;
  border: 4px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.actions-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 14px;
}
.tab-dash {
  flex: 1;
  padding: 10px;
  background: transparent;
  border: none;
  color: var(--text2);
  cursor: pointer;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab-dash.active { background: var(--accent); color: #fff; }
.tab-dash:hover:not(.active) { color: var(--text); }
.tab-dash .count {
  background: rgba(255,255,255,0.2);
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 0.75rem;
  margin-left: 4px;
}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="app-container" id="appContainer">
  <div class="card">
    <div class="loading-spinner">
      <div class="spinner"></div>
      <p>Conectando ao servidor...</p>
    </div>
  </div>
</div>

<script>
(function() {
  // ============================================
  // CONFIGURAÇÃO DE EMAIL (EmailJS)
  // ============================================
  // Para habilitar o envio de emails:
  // 1. Crie uma conta em https://www.emailjs.com/
  // 2. Adicione um serviço de email (Gmail, Outlook, etc.)
  // 3. Crie um template de email com as variáveis:
  //    {{to_email}}, {{to_name}}, {{pauta_title}},
  //    {{pauta_date}}, {{creator_name}}, {{pauta_content}}
  // 4. Substitua os valores abaixo pela sua chave pública,
  //    Service ID e Template ID do EmailJS
  // Deixe como está se não quiser configurar emails agora —
  // o sistema funcionará normalmente, apenas sem enviar emails.
  const emailConfig = {
    publicKey: 'SEU_EMAILJS_PUBLIC_KEY',
    serviceId: 'SEU_SERVICE_ID',
    templateId: 'SEU_TEMPLATE_ID',
  };

  function isEmailConfigured() {
    return typeof emailjs !== 'undefined' &&
           emailConfig.publicKey &&
           emailConfig.publicKey !== 'SEU_EMAILJS_PUBLIC_KEY' &&
           emailConfig.serviceId !== 'SEU_SERVICE_ID' &&
           emailConfig.templateId !== 'SEU_TEMPLATE_ID';
  }

  // Inicializa EmailJS se configurado
  if (isEmailConfigured()) {
    emailjs.init(emailConfig.publicKey);
  }

  const firebaseConfig = {
    apiKey: "AIzaSyGN0Hry8Vgctui8aVQhEfaRDXBdLRPtfYE",
    authDomain: "pautareuniao-d94f6.firebaseapp.com",
    databaseURL: "https://pautareuniao-d94f6-default-rtdb.firebaseio.com",
    projectId: "pautareuniao-d94f6",
    storageBucket: "pautareuniao-d94f6.firebasestorage.app",
    messagingSenderId: "5682239227",
    appId: "1:5682239227:web:2138a8250ed0f93ae7825e",
    measurementId: "G-16GQWMS3H1"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const usersRef = db.ref('users');
  const pautasRef = db.ref('pautas');
  const configRef = db.ref('config');

  let currentUser = null;

  function saveSession(user) {
    currentUser = user;
    sessionStorage.setItem('currentUserId', user.id);
  }
  function clearSession() {
    currentUser = null;
    sessionStorage.removeItem('currentUserId');
  }
  async function restoreSession() {
    const uid = sessionStorage.getItem('currentUserId');
    if (uid) {
      const snap = await usersRef.child(uid).once('value');
      const user = snap.val();
      if (user) { currentUser = user; return true; }
    }
    return false;
  }

  function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }
  function formatDate(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr);
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const yyyy = d.getFullYear();
    const hh = String(d.getHours()).padStart(2,'0');
    const min = String(d.getMinutes()).padStart(2,'0');
    return `${dd}/${mm}/${yyyy} às ${hh}:${min}`;
  }
  function formatDateBR(dateStr) {
    if (!dateStr) return 'Não definida';
    return dateStr.split('-').reverse().join('/');
  }
  function showToast(msg, type='info') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast toast-'+type;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(()=>t.remove(), 3500);
  }
  function generateId() {
    return 'id_'+Date.now()+'_'+Math.random().toString(36).substr(2,9);
  }
  function objToArray(obj) {
    if (!obj) return [];
    return Object.values(obj);
  }
  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  // ============ ENVIO DE EMAIL ============
  async function sendEmailToAllowedUsers(pauta, allowedUserIds) {
    if (!isEmailConfigured()) {
      console.log('ℹ️ EmailJS não configurado — email não enviado.');
      return;
    }
    if (!allowedUserIds || allowedUserIds.length === 0) {
      console.log('ℹ️ Nenhum destinatário selecionado — email não enviado.');
      return;
    }
    try {
      const snap = await usersRef.once('value');
      const allUsers = objToArray(snap.val());
      const creator = allUsers.find(u => u.id === pauta.createdBy);
      const creatorName = creator ? creator.name : 'Desconhecido';

      const recipients = allUsers.filter(u =>
        allowedUserIds.includes(u.id) && u.email && isValidEmail(u.email)
      );

      if (recipients.length === 0) {
        console.log('ℹ️ Nenhum destinatário com e-mail válido — email não enviado.');
        return;
      }

      let enviados = 0;
      for (const recipient of recipients) {
        try {
          await emailjs.send(
            emailConfig.serviceId,
            emailConfig.templateId,
            {
              to_email: recipient.email,
              to_name: recipient.name,
              pauta_title: pauta.title,
              pauta_date: formatDateBR(pauta.date),
              creator_name: creatorName,
              pauta_content: pauta.content,
            },
            emailConfig.publicKey
          );
          enviados++;
        } catch (err) {
          console.error('Erro ao enviar email para ' + recipient.email, err);
        }
      }
      if (enviados > 0) {
        console.log(`✅ Emails enviados para ${enviados} destinatário(s).`);
        showToast(`📧 Email enviado para ${enviados} responsável(is)!`, 'success');
      }
    } catch (error) {
      console.error('Erro geral ao enviar emails:', error);
    }
  }

  const appContainer = document.getElementById('appContainer');

  function render(html) {
    appContainer.innerHTML = html;
    appContainer.classList.remove('wide');
  }
  function renderWide(html) {
    appContainer.innerHTML = html;
    appContainer.classList.add('wide');
  }

  // ============ LOGIN ============
  function renderLogin() {
    clearSession();
    appContainer.classList.remove('wide');
    render(`
      <div class="card">
        <img src="https://images.unsplash.com/photo-1600880292203-757bb62b4baf?w=800&h=300&fit=crop&auto=format"
          alt="Reunião" class="header-image" loading="eager" />
        <div class="card-header">
          <div class="logo-icon">📋</div>
          <h1>Pautas de Reunião</h1>
          <p>Gerencie e acesse pautas corporativas</p>
        </div>
        <div class="tabs" id="loginTabs">
          <button class="tab active" onclick="switchTab('login')">🔑 Entrar</button>
          <button class="tab" onclick="switchTab('register')">📝 Cadastrar</button>
        </div>
        <div id="tabContent"></div>
      </div>
    `);
    renderLoginForm();
  }

  window.switchTab = function(t) {
    document.querySelectorAll('#loginTabs .tab').forEach((el,i)=>{
      el.classList.toggle('active', (t==='login' && i===0) || (t==='register' && i===1));
    });
    if (t==='login') renderLoginForm();
    else renderRegisterForm();
  }

  function renderLoginForm() {
    document.getElementById('tabContent').innerHTML = `
      <form onsubmit="handleLogin(event)" autocomplete="off">
        <div class="form-group">
          <label>Usuário</label>
          <input type="text" id="loginUser" placeholder="Seu nome de usuário" required />
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="loginPass" placeholder="Sua senha" required />
        </div>
        <button type="submit" class="btn btn-primary">Entrar no Sistema</button>
      </form>
    `;
  }

  function renderRegisterForm() {
    document.getElementById('tabContent').innerHTML = `
      <form onsubmit="handleRegister(event)" autocomplete="off">
        <div class="form-group">
          <label>Nome completo</label>
          <input type="text" id="regName" placeholder="Ex: João Silva" required />
        </div>
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="regEmail" placeholder="Ex: joao@empresa.com" required />
        </div>
        <div class="form-group">
          <label>Nome de usuário</label>
          <input type="text" id="regUser" placeholder="Ex: joao.silva" required />
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="regPass" placeholder="Mínimo 4 caracteres" required minlength="4" />
        </div>
        <button type="submit" class="btn btn-primary">Criar Conta</button>
      </form>
    `;
  }

  window.handleLogin = async function(e) {
    e.preventDefault();
    const usr = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value.trim();
    const snap = await usersRef.once('value');
    const users = objToArray(snap.val());
    const user = users.find(u => u.username === usr && u.password === pass);
    if (!user) { showToast('Usuário ou senha inválidos.','error'); return; }
    saveSession(user);
    showToast(`Bem-vindo(a), ${user.name}!`,'success');
    await renderDashboard();
  }

  window.handleRegister = async function(e) {
    e.preventDefault();
    const nome = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const usern = document.getElementById('regUser').value.trim();
    const pass = document.getElementById('regPass').value.trim();

    if (!isValidEmail(email)) {
      showToast('Por favor, informe um e-mail válido.','error');
      return;
    }
    if (pass.length < 4) { showToast('A senha deve ter pelo menos 4 caracteres.','error'); return; }

    const cSnap = await configRef.child('adminExists').once('value');
    const adminExists = cSnap.val() === true;
    const uSnap = await usersRef.once('value');
    const usuarios = objToArray(uSnap.val());
    if (usuarios.find(u => u.username === usern)) {
      showToast('Este nome de usuário já está em uso.','error');
      return;
    }
    if (usuarios.find(u => u.email && u.email.toLowerCase() === email.toLowerCase())) {
      showToast('Este e-mail já está cadastrado.','error');
      return;
    }

    const primeiro = !adminExists;
    const role = primeiro ? 'admin' : 'user';
    const novoUser = {
      id: generateId(),
      name: nome,
      email: email,
      username: usern,
      password: pass,
      role,
      createdAt: new Date().toISOString()
    };
    await usersRef.child(novoUser.id).set(novoUser);
    if (primeiro) await configRef.child('adminExists').set(true);
    showToast(primeiro ? 'Conta criada! Você é o Administrador do sistema.' : 'Conta criada com sucesso! Faça login.', 'success');
    if (primeiro) { saveSession(novoUser); await renderDashboard(); }
    else { switchTab('login'); renderLoginForm(); }
  }

  window.handleLogout = async function() {
    clearSession();
    showToast('Sessão encerrada.','info');
    renderLogin();
  }

  // ============ DASHBOARD ============
  async function renderDashboard() {
    if (!currentUser) {
      const res = await restoreSession();
      if (!res) { renderLogin(); return; }
    }
    const snapU = await usersRef.once('value');
    const allU = objToArray(snapU.val());
    const snapP = await pautasRef.once('value');
    const allP = objToArray(snapP.val());
    const isAdmin = currentUser.role === 'admin';

    const pendentes = allP.filter(p => p.status === 'pending');
    const ativas = allP.filter(p => p.status === 'active');

    let minhasPautas, pautasDisponiveis;

    if (isAdmin) {
      minhasPautas = allP;
      pautasDisponiveis = ativas;
    } else {
      minhasPautas = allP.filter(p => p.createdBy === currentUser.id);
      pautasDisponiveis = ativas.filter(p =>
        (p.allowedUsers && p.allowedUsers.includes(currentUser.id)) || p.createdBy === currentUser.id
      );
    }

    pautasDisponiveis.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    minhasPautas.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

    const qtdPendentes = pendentes.length;

    let html = `
      <div class="card">
        <div class="topbar">
          <div class="user-info">
            <div class="avatar">${currentUser.name.charAt(0).toUpperCase()}</div>
            <div>
              <strong>${escapeHTML(currentUser.name)}</strong><br/>
              <span class="badge ${isAdmin?'badge-admin':'badge-user'}">${isAdmin?'👑 Administrador':'👤 Usuário'}</span>
            </div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn btn-primary btn-sm" onclick="renderNovaPauta()">➕ Nova Pauta</button>
            <button class="btn btn-outline btn-sm" onclick="handleLogout()">🚪 Sair</button>
          </div>
        </div>
    `;

    if (isAdmin) {
      html += `
        <div class="tabs" id="dashTabs" style="margin-bottom:20px;">
          <button class="tab-dash active" onclick="switchDashTab('disponiveis', ${ativas.length})">📋 Ativas <span class="count">${ativas.length}</span></button>
          <button class="tab-dash" onclick="switchDashTab('pendentes', ${qtdPendentes})">⏳ Pendentes <span class="count">${qtdPendentes}</span></button>
          <button class="tab-dash" onclick="switchDashTab('todas', ${allP.length})">📂 Todas <span class="count">${allP.length}</span></button>
        </div>
        <div id="dashContent"></div>
      `;
      renderWide(html);
      window._dashData = { ativas, pendentes, allP, allU, isAdmin };
      switchDashTab('disponiveis', ativas.length);
    } else {
      html += `
        <div class="tabs" id="dashTabs" style="margin-bottom:20px;">
          <button class="tab-dash active" onclick="switchDashTabUser('disponiveis')">📋 Disponíveis <span class="count">${pautasDisponiveis.length}</span></button>
          <button class="tab-dash" onclick="switchDashTabUser('minhas')">📝 Minhas <span class="count">${minhasPautas.length}</span></button>
        </div>
        <div id="dashContent"></div>
      `;
      renderWide(html);
      window._dashDataUser = { pautasDisponiveis, minhasPautas, allU, isAdmin };
      switchDashTabUser('disponiveis');
    }

    html += `</div>`;
  }

  // ============ ABAS DO ADMIN ============
  window.switchDashTab = function(tab, count) {
    document.querySelectorAll('#dashTabs .tab-dash').forEach(el => el.classList.remove('active'));
    event.target.closest('.tab-dash').classList.add('active');

    const { ativas, pendentes, allP, allU, isAdmin } = window._dashData;
    const content = document.getElementById('dashContent');

    if (tab === 'disponiveis') {
      content.innerHTML = renderPautasList(ativas, allU, isAdmin, 'ativa');
    } else if (tab === 'pendentes') {
      if (pendentes.length === 0) {
        content.innerHTML = `<div class="empty-state"><div class="icon">✅</div><p>Nenhuma pauta pendente de aprovação.</p></div>`;
      } else {
        content.innerHTML = renderPautasList(pendentes, allU, isAdmin, 'pendente');
      }
    } else if (tab === 'todas') {
      content.innerHTML = renderPautasList(allP, allU, isAdmin, 'todas');
    }
  }

  // ============ ABAS DO USUÁRIO ============
  window.switchDashTabUser = function(tab) {
    document.querySelectorAll('#dashTabs .tab-dash').forEach(el => el.classList.remove('active'));
    event.target.closest('.tab-dash').classList.add('active');

    const { pautasDisponiveis, minhasPautas, allU, isAdmin } = window._dashDataUser;
    const content = document.getElementById('dashContent');

    if (tab === 'disponiveis') {
      content.innerHTML = renderPautasList(pautasDisponiveis, allU, isAdmin, 'ativa');
    } else if (tab === 'minhas') {
      content.innerHTML = renderPautasList(minhasPautas, allU, isAdmin, 'minhas');
    }
  }

  // ============ RENDERIZAÇÃO DE PAUTAS (EXPANDIDAS) ============
  function renderPautasList(pautas, allU, isAdmin, mode) {
    if (pautas.length === 0) {
      return `<div class="empty-state"><div class="icon">📭</div><p>Nenhuma pauta encontrada.</p></div>`;
    }
    let html = '';
    pautas.forEach(p => {
      html += renderExpandedPauta(p, allU, isAdmin, mode);
    });
    return html;
  }

  function renderExpandedPauta(p, allU, isAdmin, mode) {
    const criador = allU.find(u => u.id === p.createdBy);
    const criadorNome = criador ? criador.name : 'Desconhecido';
    const statusBadge = p.status === 'pending'
      ? '<span class="status-badge status-pending">⏳ Pendente</span>'
      : '<span class="status-badge status-active">✅ Ativa</span>';

    const usuariosPermitidos = p.allowedUsers && p.allowedUsers.length > 0
      ? p.allowedUsers.map(uid => allU.find(u => u.id === uid)).filter(Boolean).map(u => u.name).join(', ')
      : 'Nenhum';

    let actionsHTML = '';

    if (isAdmin) {
      if (p.status === 'pending') {
        actionsHTML = `
          <div class="actions-row">
            <button class="btn btn-success btn-sm" onclick="aprovarPauta('${p.id}')">✅ Aprovar e Definir Acessos</button>
            <button class="btn btn-danger btn-sm" onclick="excluirPauta('${p.id}')">🗑️ Excluir</button>
          </div>
        `;
      } else {
        actionsHTML = `
          <div class="actions-row">
            <button class="btn btn-outline btn-sm" onclick="editarPermissoes('${p.id}')">✏️ Editar Permissões</button>
            <button class="btn btn-danger btn-sm" onclick="excluirPauta('${p.id}')">🗑️ Excluir</button>
          </div>
        `;
      }
    } else if (mode === 'minhas' && p.status === 'pending' && p.createdBy === currentUser.id) {
      actionsHTML = `
        <div class="actions-row">
          <button class="btn btn-outline btn-sm" onclick="editarMinhaPauta('${p.id}')">✏️ Editar</button>
          <button class="btn btn-danger btn-sm" onclick="excluirMinhaPauta('${p.id}')">🗑️ Cancelar Envio</button>
        </div>
      `;
    }

    const pendingWarning = (p.status === 'pending' && !isAdmin)
      ? `<div style="color:var(--orange);font-size:0.85rem;margin:10px 0;">⏳ Esta pauta está aguardando aprovação do administrador.</div>`
      : '';

    return `
      <div class="pauta-card-expanded">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;">
          <h3 style="flex:1;">📌 ${escapeHTML(p.title)}</h3>
          ${statusBadge}
        </div>
        <div class="meta">
          <span>📅 Reunião: <strong>${formatDateBR(p.date)}</strong></span>
          <span>👤 Criado por: <strong>${escapeHTML(criadorNome)}</strong></span>
          <span>🕐 ${formatDate(p.createdAt)}</span>
        </div>
        <div class="pauta-content-display">${escapeHTML(p.content)}</div>
        ${pendingWarning}
        <div style="color:var(--text2);font-size:0.8rem;margin-top:8px;">
          🔒 ${p.status === 'active' ? 'Visível para' : 'Sugestão de acesso'}: <strong style="color:#fff;">${escapeHTML(usuariosPermitidos)}</strong>
          ${isAdmin && p.status === 'active' ? '<span style="color:var(--gold);"> | 👑 Admin vê tudo</span>' : ''}
        </div>
        ${actionsHTML}
      </div>
    `;
  }

  // ============ NOVA PAUTA ============
  window.renderNovaPauta = async function() {
    if (!currentUser) return;
    const snap = await usersRef.once('value');
    const allU = objToArray(snap.val());
    const usuarios = allU.filter(u => u.id !== currentUser.id);

    let usuariosHTML = '';
    if (usuarios.length === 0) {
      usuariosHTML = '<p style="color:var(--text2);font-size:0.85rem;">Nenhum outro usuário cadastrado.</p>';
    } else {
      usuariosHTML = '<div class="checkbox-list">';
      usuarios.forEach(u => {
        usuariosHTML += `
          <label class="checkbox-item">
            <input type="checkbox" value="${u.id}" class="perm-check" />
            ${escapeHTML(u.name)} <span style="color:var(--text2);font-size:0.75rem;">(@${escapeHTML(u.username)})</span>
          </label>
        `;
      });
      usuariosHTML += '</div><p style="color:var(--text2);font-size:0.75rem;margin-top:6px;">Marque os responsáveis que receberão a pauta por e-mail.</p>';
    }

    const isAdmin = currentUser.role === 'admin';
    const submitLabel = isAdmin ? '💾 Criar Pauta (Ativa)' : '📤 Enviar para Aprovação';

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <button class="close-btn" onclick="this.closest('.modal-overlay').remove()">✕</button>
        <h2>➕ Criar Nova Pauta</h2>
        ${!isAdmin ? '<p style="color:var(--orange);font-size:0.85rem;margin-bottom:14px;">⚠️ Sua pauta será enviada para aprovação do administrador antes de ficar visível.</p>' : ''}
        <form onsubmit="handleCriarPauta(event)" autocomplete="off">
          <div class="form-group">
            <label>Título da Pauta</label>
            <input type="text" id="pautaTitle" placeholder="Reunião de Planejamento Q3" required />
          </div>
          <div class="form-group">
            <label>Data da Reunião</label>
            <input type="date" id="pautaDate" required />
          </div>
          <div class="form-group">
            <label>Conteúdo da Pauta</label>
            <textarea id="pautaContent" rows="5" placeholder="Descreva os tópicos da reunião..." required></textarea>
          </div>
          <div class="form-group">
            <label>🔒 Responsáveis (receberão e-mail):</label>
            ${usuariosHTML}
          </div>
          <button type="submit" class="btn btn-primary">${submitLabel}</button>
        </form>
      </div>
    `;
    document.body.appendChild(overlay);
    document.getElementById('pautaDate').value = new Date().toISOString().split('T')[0];
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  }

  window.handleCriarPauta = async function(e) {
    e.preventDefault();
    const t = document.getElementById('pautaTitle').value.trim();
    const d = document.getElementById('pautaDate').value;
    const c = document.getElementById('pautaContent').value.trim();
    const checks = document.querySelectorAll('.perm-check:checked');
    const allowedUsers = Array.from(checks).map(cb => cb.value);
    const isAdmin = currentUser.role === 'admin';

    const nova = {
      id: generateId(),
      title: t,
      date: d,
      content: c,
      createdBy: currentUser.id,
      allowedUsers,
      status: isAdmin ? 'active' : 'pending',
      createdAt: new Date().toISOString()
    };
    await pautasRef.child(nova.id).set(nova);
    document.querySelector('.modal-overlay')?.remove();

    // Dispara e-mail para os responsáveis se for admin (pauta já ativa)
    if (isAdmin && allowedUsers.length > 0) {
      await sendEmailToAllowedUsers(nova, allowedUsers);
    }

    showToast(isAdmin ? 'Pauta criada e publicada com sucesso!' : 'Pauta enviada para aprovação do administrador!', 'success');
    await renderDashboard();
  }

  // ============ APROVAR PAUTA (ADMIN) ============
  window.aprovarPauta = async (pId) => {
    if (!currentUser || currentUser.role !== 'admin') return;
    const snap = await pautasRef.child(pId).once('value');
    const pauta = snap.val();
    if (!pauta) return;

    const snapU = await usersRef.once('value');
    const allU = objToArray(snapU.val());
    const usuarios = allU.filter(u => u.id !== currentUser.id);

    let usuariosHTML = '';
    if (usuarios.length === 0) {
      usuariosHTML = '<p style="color:var(--text2);font-size:0.85rem;">Nenhum outro usuário cadastrado.</p>';
    } else {
      usuariosHTML = '<div class="checkbox-list">';
      usuarios.forEach(u => {
        const checked = pauta.allowedUsers && pauta.allowedUsers.includes(u.id) ? 'checked' : '';
        usuariosHTML += `
          <label class="checkbox-item">
            <input type="checkbox" value="${u.id}" class="perm-check-approve" ${checked} />
            ${escapeHTML(u.name)} <span style="color:var(--text2);font-size:0.75rem;">(@${escapeHTML(u.username)})</span>
          </label>
        `;
      });
      usuariosHTML += '</div><p style="color:var(--text2);font-size:0.75rem;margin-top:6px;">Selecione quem poderá visualizar esta pauta. Um e-mail será enviado aos selecionados.</p>';
    }

    document.querySelector('.modal-overlay')?.remove();
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <button class="close-btn" onclick="this.closest('.modal-overlay').remove()">✕</button>
        <h2>✅ Aprovar Pauta</h2>
        <p style="color:var(--text2);margin-bottom:14px;">Pauta: <strong style="color:#fff;">${escapeHTML(pauta.title)}</strong></p>
        <p style="color:var(--green);font-size:0.85rem;margin-bottom:14px;">✔️ A pauta será aprovada e publicada. Um e-mail será disparado para os responsáveis selecionados.</p>
        <div class="form-group">
          <label>🔒 Permitir acesso a:</label>
          ${usuariosHTML}
        </div>
        <button class="btn btn-success btn-sm" onclick="confirmarAprovacao('${pauta.id}')" style="width:auto;">✅ Aprovar e Publicar</button>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  }

  window.confirmarAprovacao = async (pId) => {
    const checks = document.querySelectorAll('.perm-check-approve:checked');
    const allowedUsers = Array.from(checks).map(cb => cb.value);
    await pautasRef.child(pId).update({
      status: 'active',
      allowedUsers: allowedUsers
    });

    // Dispara e-mail para os responsáveis após aprovação
    const snap = await pautasRef.child(pId).once('value');
    const pauta = snap.val();
    if (pauta && allowedUsers.length > 0) {
      await sendEmailToAllowedUsers(pauta, allowedUsers);
    }

    document.querySelector('.modal-overlay')?.remove();
    showToast('Pauta aprovada e publicada com sucesso!', 'success');
    await renderDashboard();
  }

  // ============ EDITAR PERMISSÕES (ADMIN) ============
  window.editarPermissoes = async (pId) => {
    if (!currentUser || currentUser.role !== 'admin') return;
    const snap = await pautasRef.child(pId).once('value');
    const pauta = snap.val();
    if (!pauta) return;

    const snapU = await usersRef.once('value');
    const allU = objToArray(snapU.val());
    const usuarios = allU.filter(u => u.id !== currentUser.id);

    let usuariosHTML = '';
    if (usuarios.length === 0) {
      usuariosHTML = '<p style="color:var(--text2);font-size:0.85rem;">Nenhum outro usuário cadastrado.</p>';
    } else {
      usuariosHTML = '<div class="checkbox-list">';
      usuarios.forEach(u => {
        const checked = pauta.allowedUsers && pauta.allowedUsers.includes(u.id) ? 'checked' : '';
        usuariosHTML += `
          <label class="checkbox-item">
            <input type="checkbox" value="${u.id}" class="perm-check-edit" ${checked} />
            ${escapeHTML(u.name)} <span style="color:var(--text2);font-size:0.75rem;">(@${escapeHTML(u.username)})</span>
          </label>
        `;
      });
      usuariosHTML += '</div>';
    }

    document.querySelector('.modal-overlay')?.remove();
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <button class="close-btn" onclick="this.closest('.modal-overlay').remove()">✕</button>
        <h2>✏️ Editar Permissões</h2>
        <p style="color:var(--text2);margin-bottom:14px;">Pauta: <strong style="color:#fff;">${escapeHTML(pauta.title)}</strong></p>
        <div class="form-group">
          <label>🔒 Permitir acesso a:</label>
          ${usuariosHTML}
        </div>
        <button class="btn btn-primary btn-sm" onclick="salvarPermissoes('${pauta.id}')" style="width:auto;">💾 Salvar Permissões</button>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  }

  window.salvarPermissoes = async (pId) => {
    const checks = document.querySelectorAll('.perm-check-edit:checked');
    const allowedUsers = Array.from(checks).map(cb => cb.value);
    await pautasRef.child(pId).child('allowedUsers').set(allowedUsers);
    document.querySelector('.modal-overlay')?.remove();
    showToast('Permissões atualizadas!', 'success');
    await renderDashboard();
  }

  // ============ EDITAR MINHA PAUTA (USUÁRIO) ============
  window.editarMinhaPauta = async (pId) => {
    if (!currentUser) return;
    const snap = await pautasRef.child(pId).once('value');
    const pauta = snap.val();
    if (!pauta || pauta.createdBy !== currentUser.id) { showToast('Acesso negado.','error'); return; }

    const snapU = await usersRef.once('value');
    const allU = objToArray(snapU.val());
    const usuarios = allU.filter(u => u.id !== currentUser.id);

    let usuariosHTML = '';
    if (usuarios.length === 0) {
      usuariosHTML = '<p style="color:var(--text2);font-size:0.85rem;">Nenhum outro usuário cadastrado.</p>';
    } else {
      usuariosHTML = '<div class="checkbox-list">';
      usuarios.forEach(u => {
        const checked = pauta.allowedUsers && pauta.allowedUsers.includes(u.id) ? 'checked' : '';
        usuariosHTML += `
          <label class="checkbox-item">
            <input type="checkbox" value="${u.id}" class="perm-check-myedit" ${checked} />
            ${escapeHTML(u.name)} <span style="color:var(--text2);font-size:0.75rem;">(@${escapeHTML(u.username)})</span>
          </label>
        `;
      });
      usuariosHTML += '</div><p style="color:var(--text2);font-size:0.75rem;margin-top:6px;">Sugira quem deve ter acesso (sujeito à aprovação do admin).</p>';
    }

    document.querySelector('.modal-overlay')?.remove();
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <button class="close-btn" onclick="this.closest('.modal-overlay').remove()">✕</button>
        <h2>✏️ Editar Minha Pauta</h2>
        <p style="color:var(--orange);font-size:0.85rem;margin-bottom:14px;">🔄 Alterações serão reenviadas para aprovação.</p>
        <form onsubmit="handleEditarMinhaPauta(event, '${pId}')" autocomplete="off">
          <div class="form-group">
            <label>Título</label>
            <input type="text" id="editTitle" value="${escapeHTML(pauta.title)}" required />
          </div>
          <div class="form-group">
            <label>Data da Reunião</label>
            <input type="date" id="editDate" value="${pauta.date || ''}" required />
          </div>
          <div class="form-group">
            <label>Conteúdo</label>
            <textarea id="editContent" rows="5" required>${escapeHTML(pauta.content)}</textarea>
          </div>
          <div class="form-group">
            <label>🔒 Sugerir acesso a:</label>
            ${usuariosHTML}
          </div>
          <button type="submit" class="btn btn-primary">📤 Reenviar para Aprovação</button>
        </form>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  }

  window.handleEditarMinhaPauta = async function(e, pId) {
    e.preventDefault();
    const t = document.getElementById('editTitle').value.trim();
    const d = document.getElementById('editDate').value;
    const c = document.getElementById('editContent').value.trim();
    const checks = document.querySelectorAll('.perm-check-myedit:checked');
    const allowedUsers = Array.from(checks).map(cb => cb.value);

    await pautasRef.child(pId).update({
      title: t,
      date: d,
      content: c,
      allowedUsers: allowedUsers,
      status: 'pending'
    });
    document.querySelector('.modal-overlay')?.remove();
    showToast('Pauta atualizada e reenviada para aprovação!', 'success');
    await renderDashboard();
  }

  // ============ EXCLUIR PAUTA ============
  window.excluirPauta = async (id) => {
    if (!currentUser || currentUser.role !== 'admin') return;
    if (!confirm('Tem certeza que deseja excluir esta pauta? Esta ação NÃO pode ser desfeita.')) return;
    await pautasRef.child(id).remove();
    document.querySelector('.modal-overlay')?.remove();
    showToast('Pauta excluída.', 'info');
    await renderDashboard();
  }

  window.excluirMinhaPauta = async (id) => {
    if (!currentUser) return;
    const snap = await pautasRef.child(id).once('value');
    const pauta = snap.val();
    if (!pauta || pauta.createdBy !== currentUser.id) { showToast('Acesso negado.','error'); return; }
    if (!confirm('Tem certeza que deseja cancelar o envio desta pauta?')) return;
    await pautasRef.child(id).remove();
    document.querySelector('.modal-overlay')?.remove();
    showToast('Pauta cancelada.', 'info');
    await renderDashboard();
  }

  // ============ INICIALIZAR ============
  async function init() {
    try {
      const res = await restoreSession();
      if (res) { await renderDashboard(); } else { renderLogin(); }
    } catch(e) {
      console.error(e);
      render(`<div class="card">
        <div class="card-header">
          <div class="logo-icon">⚠️</div>
          <h1>Erro de conexão</h1>
          <p>Verifique sua conexão com o Firebase.</p>
          <button class="btn btn-primary" onclick="location.reload()" style="margin-top:20px;width:auto;">🔄 Tentar Novamente</button>
        </div>
      </div>`);
    }
  }

  init();
})();
</script>
</body>
</html>
