<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pautas de Reunião</title>

    <!-- ========== FIREBASE SDK ========== -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

    <!-- ========== ESTILOS ========== -->
    <style>
        :root {
            --bg: #0f0f14;
            --surface: #1a1a24;
            --surface2: #22222f;
            --border: #2a2a3a;
            --text: #e1e1ec;
            --text2: #9898b0;
            --accent: #6c5ce7;
            --accent2: #a29bfe;
            --green: #00d2a0;
            --red: #ff5e5e;
            --gold: #f0c040;
            --radius: 14px;
            --radius-sm: 10px;
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.45);
            --font: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(108, 92, 231, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(0, 210, 160, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(240, 192, 64, 0.03) 0%, transparent 70%);
            background-attachment: fixed;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .app-container {
            width: 100%;
            max-width: 520px;
            margin: 20px;
            animation: fadeUp 0.5s ease;
        }
        .app-container.wide {
            max-width: 980px;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px 32px;
            box-shadow: var(--shadow);
        }
        .card-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header-image {
            width: 100%;
            height: 160px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            filter: brightness(0.85);
        }

        .logo-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }
        .card-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #fff;
        }
        .card-header p {
            color: var(--text2);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text2);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 0.95rem;
            font-family: var(--font);
            transition: border 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 13px 24px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-family: var(--font);
            letter-spacing: 0.2px;
            width: 100%;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover {
            background: #7d6ff0;
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(108, 92, 231, 0.35);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            background: var(--surface2);
            border-color: var(--accent);
        }
        .btn-danger {
            background: var(--red);
            color: #fff;
        }
        .btn-danger:hover {
            background: #ff7070;
        }
        .btn-green {
            background: var(--green);
            color: #000;
        }
        .btn-green:hover {
            background: #00e6b0;
        }
        .btn-sm {
            padding: 8px 14px;
            font-size: 0.78rem;
            width: auto;
            border-radius: 8px;
        }
        .btn-xs {
            padding: 5px 10px;
            font-size: 0.7rem;
            width: auto;
            border-radius: 6px;
        }

        .link {
            color: var(--accent2);
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .link:hover {
            color: #c4bfff;
            text-decoration: underline;
        }

        .divider {
            text-align: center;
            color: var(--text2);
            font-size: 0.82rem;
            margin: 18px 0;
            position: relative;
        }
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: var(--border);
        }
        .divider::before {
            left: 0;
        }
        .divider::after {
            right: 0;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .topbar .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .topbar .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #fff;
            font-size: 1.1rem;
        }
        .topbar .badge {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .badge-admin {
            background: rgba(240, 192, 64, 0.2);
            color: var(--gold);
        }
        .badge-user {
            background: rgba(0, 210, 160, 0.15);
            color: var(--green);
        }

        .pauta-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 20px;
            margin-bottom: 14px;
            transition: border-color 0.2s, transform 0.15s;
            cursor: pointer;
            position: relative;
        }
        .pauta-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .pauta-card h3 {
            font-size: 1.05rem;
            color: #fff;
            margin-bottom: 6px;
        }
        .pauta-card .meta {
            font-size: 0.78rem;
            color: var(--text2);
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }
        .pauta-card .meta span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text2);
        }
        .empty-state .icon {
            font-size: 56px;
            margin-bottom: 12px;
        }

        /* ===== LOADING ===== */
        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            flex-direction: column;
            gap: 14px;
            color: var(--text2);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 24px;
            width: 100%;
            max-width: 580px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
            animation: scaleIn 0.25s ease;
        }
        @keyframes scaleIn {
            from {
                transform: scale(0.94);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        .modal h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #fff;
        }
        .modal .close-btn {
            position: sticky;
            float: right;
            top: 0;
            background: none;
            border: none;
            color: var(--text2);
            font-size: 1.8rem;
            cursor: pointer;
            line-height: 1;
            padding: 0 4px;
            z-index: 5;
        }
        .modal .close-btn:hover {
            color: #fff;
        }

        .checkbox-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px;
            background: var(--surface2);
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 6px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.88rem;
            transition: background 0.15s;
        }
        .checkbox-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        .checkbox-item input {
            accent-color: var(--accent);
            width: 17px;
            height: 17px;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 200;
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.88rem;
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.5s forwards;
            max-width: 380px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        @keyframes slideIn {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }
        .toast-success {
            background: #0d3324;
            border: 1px solid var(--green);
            color: var(--green);
        }
        .toast-error {
            background: #330f0f;
            border: 1px solid var(--red);
            color: var(--red);
        }
        .toast-info {
            background: #1a1535;
            border: 1px solid var(--accent);
            color: var(--accent2);
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 4px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
            color: var(--text2);
            border: none;
            background: none;
        }
        .tab.active {
            background: var(--accent);
            color: #fff;
        }
        .tab:hover:not(.active) {
            color: #fff;
            background: rgba(255, 255, 255, 0.04);
        }

        @media (max-width: 600px) {
            .card {
                padding: 24px 18px;
            }
            .header-image {
                height: 120px;
            }
            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }
            .modal {
                padding: 20px 16px;
                max-height: 90vh;
            }
            .tabs {
                flex-direction: column;
                gap: 2px;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- ========== TOAST CONTAINER ========== -->
    <div id="toastContainer"></div>

    <!-- ========== APP CONTAINER ========== -->
    <div class="app-container" id="appContainer">
        <div class="card">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Conectando ao servidor...</p>
            </div>
        </div>
    </div>

    <!-- ========== LÓGICA DA APLICAÇÃO ========== -->
    <script>
        (function() {
            // ==================== CONFIGURAÇÃO DO FIREBASE ====================
            // ✅ CREDENCIAIS ATUALIZADAS - Projeto: pautareuniao-d94f6

            const firebaseConfig = {
                apiKey: "AIzaSyGN0Hry8Vgctui8aVQhEfaRDXBdLRPtfYE",
                authDomain: "pautareuniao-d94f6.firebaseapp.com",
                databaseURL: "https://pautareuniao-d94f6-default-rtdb.firebaseio.com",
                projectId: "pautareuniao-d94f6",
                storageBucket: "pautareuniao-d94f6.firebasestorage.app",
                messagingSenderId: "5682239227",
                appId: "1:5682239227:web:2138a8250ed0f93ae7825e",
                measurementId: "G-16GQWMS3H1"
            };

            // Inicializa Firebase
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();

            // ==================== REFERÊNCIAS DO BANCO ====================
            const usersRef = db.ref('users');
            const pautasRef = db.ref('pautas');
            const configRef = db.ref('config');

            // ==================== SESSÃO ====================
            let currentUser = null;

            function saveSession(user) {
                currentUser = user;
                sessionStorage.setItem('currentUserId', user.id);
            }

            function clearSession() {
                currentUser = null;
                sessionStorage.removeItem('currentUserId');
            }

            async function restoreSession() {
                const userId = sessionStorage.getItem('currentUserId');
                if (userId) {
                    const snapshot = await usersRef.child(userId).once('value');
                    const user = snapshot.val();
                    if (user) {
                        currentUser = user;
                        return true;
                    }
                }
                return false;
            }

            // ==================== UTILITÁRIOS ====================
            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function formatDate(dateStr) {
                const d = new Date(dateStr);
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = d.getFullYear();
                const hours = String(d.getHours()).padStart(2, '0');
                const mins = String(d.getMinutes()).padStart(2, '0');
                return `${day}/${month}/${year} às ${hours}:${mins}`;
            }

            function showToast(message, type = 'info') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                toast.textContent = message;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }

            function generateId() {
                return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            }

            function objToArray(obj) {
                if (!obj) return [];
                return Object.values(obj);
            }

            // ==================== RENDERIZAÇÃO ====================
            const appContainer = document.getElementById('appContainer');

            function render(html) {
                appContainer.innerHTML = html;
                appContainer.classList.remove('wide');
            }

            function renderWide(html) {
                appContainer.innerHTML = html;
                appContainer.classList.add('wide');
            }

            // ==================== TELA DE LOGIN ====================
            function renderLogin() {
                clearSession();
                appContainer.classList.remove('wide');
                render(`
                    <div class="card">
                        <img
                            src="https://images.unsplash.com/photo-1600880292203-757bb62b4baf?w=800&h=300&fit=crop&auto=format"
                            alt="Reunião empresarial"
                            class="header-image"
                            loading="eager"
                        />
                        <div class="card-header">
                            <div class="logo-icon">📋</div>
                            <h1>Pautas de Reunião</h1>
                            <p>Gerencie e acesse pautas corporativas</p>
                        </div>
                        <div class="tabs" id="loginTabs">
                            <button class="tab active" onclick="switchTab('login')">🔑 Entrar</button>
                            <button class="tab" onclick="switchTab('register')">📝 Cadastrar</button>
                        </div>
                        <div id="tabContent"></div>
                    </div>
                `);
                renderLoginForm();
            }

            window.switchTab = function(tab) {
                document.querySelectorAll('#loginTabs .tab').forEach((t, i) => {
                    t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
                });
                if (tab === 'login') renderLoginForm();
                else renderRegisterForm();
            };

            function renderLoginForm() {
                document.getElementById('tabContent').innerHTML = `
                    <form onsubmit="handleLogin(event)" autocomplete="off">
                        <div class="form-group">
                            <label>Usuário</label>
                            <input type="text" id="loginUser" placeholder="Seu nome de usuário" required />
                        </div>
                        <div class="form-group">
                            <label>Senha</label>
                            <input type="password" id="loginPass" placeholder="Sua senha" required />
                        </div>
                        <button type="submit" class="btn btn-primary">Entrar no Sistema</button>
                    </form>
                `;
            }

            function renderRegisterForm() {
                document.getElementById('tabContent').innerHTML = `
                    <form onsubmit="handleRegister(event)" autocomplete="off">
                        <div class="form-group">
                            <label>Nome completo</label>
                            <input type="text" id="regName" placeholder="Ex: João Silva" required />
                        </div>
                        <div class="form-group">
                            <label>Nome de usuário</label>
                            <input type="text" id="regUser" placeholder="Ex: joao.silva" required />
                        </div>
                        <div class="form-group">
                            <label>Senha</label>
                            <input type="password" id="regPass" placeholder="Mínimo 4 caracteres" required minlength="4" />
                        </div>
                        <button type="submit" class="btn btn-primary">Criar Conta</button>
                    </form>
                `;
            }

            // ==================== HANDLERS DE AUTENTICAÇÃO ====================
            window.handleLogin = async function(event) {
                event.preventDefault();
                const username = document.getElementById('loginUser').value.trim();
                const password = document.getElementById('loginPass').value.trim();

                const snapshot = await usersRef.once('value');
                const users = objToArray(snapshot.val());

                const user = users.find(u => u.username === username && u.password === password);
                if (!user) {
                    showToast('Usuário ou senha inválidos.', 'error');
                    return;
                }
                saveSession(user);
                showToast(`Bem-vindo(a), ${user.name}!`, 'success');
                await renderDashboard();
            };

            window.handleRegister = async function(event) {
                event.preventDefault();
                const name = document.getElementById('regName').value.trim();
                const username = document.getElementById('regUser').value.trim();
                const password = document.getElementById('regPass').value.trim();

                if (password.length < 4) {
                    showToast('A senha deve ter no mínimo 4 caracteres.', 'error');
                    return;
                }

                const configSnapshot = await configRef.child('adminExists').once('value');
                const adminExists = configSnapshot.val() === true;

                const usersSnapshot = await usersRef.once('value');
                const users = objToArray(usersSnapshot.val());
                if (users.find(u => u.username === username)) {
                    showToast('Este nome de usuário já está em uso.', 'error');
                    return;
                }

                const isFirstUser = !adminExists;
                const role = isFirstUser ? 'admin' : 'user';

                const newUser = {
                    id: generateId(),
                    name,
                    username,
                    password,
                    role,
                    createdAt: new Date().toISOString(),
                };

                await usersRef.child(newUser.id).set(newUser);
                if (isFirstUser) {
                    await configRef.child('adminExists').set(true);
                }

                showToast(
                    isFirstUser ?
                    'Conta criada! Você é o Administrador do sistema.' :
                    'Conta criada com sucesso! Agora faça login.',
                    'success'
                );

                if (isFirstUser) {
                    saveSession(newUser);
                    await renderDashboard();
                } else {
                    switchTab('login');
                    renderLoginForm();
                }
            };

            window.handleLogout = async function() {
                clearSession();
                showToast('Sessão encerrada.', 'info');
                renderLogin();
            };

            // ==================== DASHBOARD ====================
            async function renderDashboard() {
                if (!currentUser) {
                    const restored = await restoreSession();
                    if (!restored) {
                        renderLogin();
                        return;
                    }
                }

                const usersSnapshot = await usersRef.once('value');
                const allUsers = objToArray(usersSnapshot.val());

                const pautasSnapshot = await pautasRef.once('value');
                const allPautas = objToArray(pautasSnapshot.val());

                const isAdmin = currentUser.role === 'admin';

                let pautasVisiveis;
                if (isAdmin) {
                    pautasVisiveis = allPautas;
                } else {
                    pautasVisiveis = allPautas.filter(p =>
                        (p.allowedUsers && p.allowedUsers.includes(currentUser.id)) || p.createdBy === currentUser.id
                    );
                }

                pautasVisiveis.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

                let html = `
                    <div class="card">
                        <div class="topbar">
                            <div class="user-info">
                                <div class="avatar">${currentUser.name.charAt(0).toUpperCase()}</div>
                                <div>
                                    <strong>${escapeHTML(currentUser.name)}</strong>
                                    <br/>
                                    <span class="badge ${isAdmin ? 'badge-admin' : 'badge-user'}">
                                        ${isAdmin ? '👑 Administrador' : '👤 Usuário'}
                                    </span>
                                </div>
                            </div>
                            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                                ${isAdmin ? `<button class="btn btn-primary btn-sm" onclick="renderNovaPauta()">➕ Nova Pauta</button>` : ''}
                                <button class="btn btn-outline btn-sm" onclick="handleLogout()">🚪 Sair</button>
                            </div>
                        </div>
                        <h2 style="margin-bottom:16px;color:#fff;">📋 Pautas de Reunião</h2>
                `;

                if (pautasVisiveis.length === 0) {
                    html += `
                        <div class="empty-state">
                            <div class="icon">📭</div>
                            <p>Nenhuma pauta disponível no momento.</p>
                            ${isAdmin ? '<p style="margin-top:6px;">Clique em <strong>"Nova Pauta"</strong> para criar a primeira.</p>' : '<p style="margin-top:6px;">O administrador ainda não compartilhou nenhuma pauta com você.</p>'}
                        </div>
                    `;
                } else {
                    pautasVisiveis.forEach(p => {
                        const criador = allUsers.find(u => u.id === p.createdBy);
                        const criadorNome = criador ? criador.name : 'Desconhecido';
                        const qtdPermitidos = p.allowedUsers ? p.allowedUsers.length : 0;
                        html += `
                            <div class="pauta-card" onclick="abrirPauta('${p.id}')">
                                <h3>📌 ${escapeHTML(p.title)}</h3>
                                <div class="meta">
                                    <span>📅 ${formatDate(p.createdAt)}</span>
                                    <span>👤 Por: ${escapeHTML(criadorNome)}</span>
                                    <span>🔒 ${qtdPermitidos} pessoa(s) autorizada(s)</span>
                                </div>
                            </div>
                        `;
                    });
                }

                html += `</div>`;
                renderWide(html);
            }

            // ==================== NOVA PAUTA (ADMIN) ====================
            window.renderNovaPauta = async function() {
                if (!currentUser || currentUser.role !== 'admin') return;

                const usersSnapshot = await usersRef.once('value');
                const allUsers = objToArray(usersSnapshot.val());
                const usuarios = allUsers.filter(u => u.id !== currentUser.id);

                let usuariosHTML = '';
                if (usuarios.length === 0) {
                    usuariosHTML =
                        '<p style="color:var(--text2);font-size:0.85rem;">Nenhum outro usuário cadastrado ainda. A pauta ficará visível apenas para você.</p>';
                } else {
                    usuariosHTML = '<div class="checkbox-list">';
                    usuarios.forEach(u => {
                        usuariosHTML += `
                            <label class="checkbox-item">
                                <input type="checkbox" value="${u.id}" class="perm-check" />
                                ${escapeHTML(u.name)} <span style="color:var(--text2);font-size:0.75rem;">(@${escapeHTML(u.username)})</span>
                            </label>
                        `;
                    });
                    usuariosHTML += '</div>';
                    usuariosHTML +=
                        '<p style="color:var(--text2);font-size:0.75rem;margin-top:6px;">Marque os usuários que poderão visualizar esta pauta.</p>';
                }

                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                    <div class="modal">
                        <button class="close-btn" onclick="this.closest('.modal-overlay').remove()">✕</button>
                        <h2>➕ Criar Nova Pauta</h2>
                        <form onsubmit="handleCriarPauta(event)" autocomplete="off">
                            <div class="form-group">
                                <label>Título da Pauta</label>
                                <input type="text" id="pautaTitle" placeholder="Ex: Reunião de Planejamento Q3" required />
                            </div>
                            <div class="form-group">
                                <label>Data da Reunião</label>
                                <input type="date" id="pautaDate" required />
                            </div>
                            <div class="form-group">
                                <label>Conteúdo da Pauta</label>
                                <textarea id="pautaContent" placeholder="Descreva os tópicos da reunião..." rows="5" required></textarea>
                            </div>
                            <div class="form-group">
                                <label>🔒 Permitir acesso a:</label>
                                ${usuariosHTML}
                            </div>
                            <button type="submit" class="btn btn-primary">💾 Salvar Pauta</button>
                        </form>
                    </div>
                `;
                document.body.appendChild(overlay);

                overlay.addEventListener('click', function(e) {
                    if (e.target === overlay) overlay.remove();
                });

                document.getElementById('pautaDate').value = new Date().toISOString().split('T')[0];
            };

            window.handleCriarPauta = async function(event) {
                event.preventDefault();
                const title = document.getElementById('pautaTitle').value.trim();
                const date = document.getElementById('pautaDate').value;
                const content = document.getElementById('pautaContent').value.trim();
                const checkboxes = document.querySelectorAll('.perm-check:checked');
                const allowedUsers = Array.from(checkboxes).map(cb => cb.value);

                const novaPauta = {
                    id: generateId(),
                    title,
                    date,
                    content,
                    createdBy: currentUser.id,
                    allowedUsers,
                    createdAt: new Date().toISOString(),
                };

                await pautasRef.child(novaPauta.id).set(novaPauta);

                document.querySelector('.modal-overlay')?.remove();
                showToast('Pauta criada com sucesso!', 'success');
                await renderDashboard();
            };

            // ==================== ABRIR PAUTA ====================
            window.abrirPauta = async function(pautaId) {
                if (!currentUser) return;

                const pautaSnapshot = await pautasRef.child(pautaId).once('value');
                const pauta = pautaSnapshot.val();
                if (!pauta) {
                    showToast('Pauta não encontrada.', 'error');
                    return;
                }

                const usersSnapshot = await usersRef.once('value');
                const allUsers = objToArray(usersSnapshot.val());

                const isAdmin = currentUser.role === 'admin';
                const temPermissao = isAdmin ||
                    (pauta.allowedUsers && pauta.allowedUsers.includes(currentUser.id)) ||
                    pauta.createdBy === currentUser.id;

                if (!temPermissao) {
                    showToast('Você não tem permissão para ver esta pauta.', 'error');
                    return;
                }

                const criador = allUsers.find(u => u.id === pauta.createdBy);
                const criadorNome = criador ? criador.name : 'Desconhecido';

                const usuariosPermitidos = pauta.allowedUsers ?
                    pauta.allowedUsers
                    .map(uid => allUsers.find(u => u.id === uid))
                    .filter(Boolean)
                    .map(u => u.name)
                    .join(', ') :
                    'Nenhum';

                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                    <div class="modal">
                        <button class="close-btn" onclick="this.closest('.modal-overlay').remove()">✕</button>
                        <h2>📌 ${escapeHTML(pauta.title)}</h2>
                        <div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:16px;color:var(--text2);font-size:0.85rem;">
                            <span>📅 Data da reunião: <strong style="color:#fff;">${pauta.date ? pauta.date.split('-').reverse().join('/') : 'Não definida'}</strong></span>
                            <span>👤 Criado por: <strong style="color:#fff;">${escapeHTML(criadorNome)}</strong></span>
                            <span>🕐 Registrado em: <strong style="color:#fff;">${formatDate(pauta.createdAt)}</strong></span>
                        </div>
                        <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:20px;margin-bottom:16px;white-space:pre-wrap;line-height:1.7;font-size:0.93rem;">
                            ${escapeHTML(pauta.content)}
                        </div>
                        <div style="color:var(--text2);font-size:0.8rem;">
                            🔒 Visível para: <strong style="color:#fff;">${escapeHTML(usuariosPermitidos)}</strong> ${isAdmin ? '| <span style="color:var(--gold);">Você vê tudo como admin</span>' : ''}
                        </div>
                        ${isAdmin ? `
                            <div style="margin-top:18px;display:flex;gap:8px;flex-wrap:wrap;">
                                <button class="btn btn-outline btn-sm" onclick="editarPauta('${pauta.id}')">✏️ Editar Permissões</button>
                                <button class="btn btn-danger btn-sm" onclick="excluirPauta('${pauta.id}')">🗑️ Excluir Pauta</button>
                            </div>
                        ` : ''}
                    </div>
                `;
                document.body.appendChild(overlay);

                overlay.addEventListener('click', function(e) {
                    if (e.target === overlay) overlay.remove();
                });
            };

            // ==================== EDITAR PERMISSÕES ====================
            window.editarPauta = async function(pautaId) {
                if (!currentUser || currentUser.role !== 'admin') return;

                const pautaSnapshot = await pautasRef.child(pautaId).once('value');
                const pauta = pautaSnapshot.val();
                if (!pauta) return;

                const usersSnapshot = await usersRef.once('value');
                const allUsers = objToArray(usersSnapshot.val());
                const usuarios = allUsers.filter(u => u.id !== currentUser.id);

                let usuariosHTML = '';
                if (usuarios.length === 0) {
                    usuariosHTML =
                        '<p style="color:var(--text2);font-size:0.85rem;">Nenhum outro usuário cadastrado.</p>';
                } else {
                    usuariosHTML = '<div class="checkbox-list">';
                    usuarios.forEach(u => {
                        const checked = pauta.allowedUsers && pauta.allowedUsers.includes(u.id) ? 'checked' : '';
                        usuariosHTML += `
                            <label class="checkbox-item">
                                <input type="checkbox" value="${u.id}" class="perm-check-edit" ${checked} />
                                ${escapeHTML(u.name)} <span style="color:var(--text2);font-size:0.75rem;">(@${escapeHTML(u.username)})</span>
                            </label>
                        `;
                    });
                    usuariosHTML += '</div>';
                }

                document.querySelector('.modal-overlay')?.remove();

                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                    <div class="modal">
                        <button class="close-btn" onclick="this.closest('.modal-overlay').remove()">✕</button>
                        <h2>✏️ Editar Permissões</h2>
                        <p style="color:var(--text2);margin-bottom:14px;">Pauta: <strong style="color:#fff;">${escapeHTML(pauta.title)}</strong></p>
                        <div class="form-group">
                            <label>🔒 Permitir acesso a:</label>
                            ${usuariosHTML}
                        </div>
                        <button class="btn btn-primary btn-sm" onclick="salvarPermissoes('${pauta.id}')" style="width:auto;">💾 Salvar Permissões</button>
                    </div>
                `;
                document.body.appendChild(overlay);

                overlay.addEventListener('click', function(e) {
                    if (e.target === overlay) overlay.remove();
                });
            };

            window.salvarPermissoes = async function(pautaId) {
                const checkboxes = document.querySelectorAll('.perm-check-edit:checked');
                const allowedUsers = Array.from(checkboxes).map(cb => cb.value);

                await pautasRef.child(pautaId).child('allowedUsers').set(allowedUsers);

                document.querySelector('.modal-overlay')?.remove();
                showToast('Permissões atualizadas!', 'success');
                await renderDashboard();
            };

            // ==================== EXCLUIR PAUTA ====================
            window.excluirPauta = async function(pautaId) {
                if (!currentUser || currentUser.role !== 'admin') return;
                if (!confirm('Tem certeza que deseja excluir esta pauta? Esta ação não pode ser desfeita.')) return;

                await pautasRef.child(pautaId).remove();

                document.querySelector('.modal-overlay')?.remove();
                showToast('Pauta excluída.', 'info');
                await renderDashboard();
            };

            // ==================== INICIALIZAÇÃO ====================
            async function init() {
                try {
                    const hasSession = await restoreSession();
                    if (hasSession) {
                        await renderDashboard();
                    } else {
                        renderLogin();
                    }
                } catch (error) {
                    console.error('Erro ao inicializar:', error);
                    render(`
                        <div class="card">
                            <div class="card-header">
                                <div class="logo-icon">⚠️</div>
                                <h1>Erro de Conexão</h1>
                                <p>Não foi possível conectar ao banco de dados.</p>
                            </div>
                            <div class="empty-state">
                                <p>Verifique se:</p>
                                <ul style="text-align:left;margin-top:10px;line-height:1.8;color:var(--text2);">
                                    <li>O <strong>firebaseConfig</strong> está correto</li>
                                    <li>O <strong>Realtime Database</strong> foi ativado no Firebase</li>
                                    <li>As regras do banco permitem leitura/escrita</li>
                                </ul>
                                <button class="btn btn-primary" onclick="location.reload()" style="margin-top:20px;width:auto;">🔄 Tentar Novamente</button>
                            </div>
                        </div>
                    `);
                }
            }

            init();
        })();
    </script>
</body>
</html>
